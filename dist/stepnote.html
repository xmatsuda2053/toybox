  :host([appearance='filled']) .combobox {
    background-color: var(--wa-color-neutral-fill-quiet);
    border-color: var(--wa-color-neutral-fill-quiet);
  }

  :host([appearance='filled-outlined']) .combobox {
    background-color: var(--wa-color-neutral-fill-quiet);
    border-color: var(--wa-form-control-border-color);
  }

  .display-input {
    position: relative;
    width: 100%;
    font: inherit;
    border: none;
    background: none;
    line-height: var(--wa-form-control-value-line-height);
    color: var(--wa-form-control-value-color);
    cursor: inherit;
    overflow: hidden;
    padding: 0;
    margin: 0;
    -webkit-appearance: none;

    &:focus {
      outline: none;
    }

    &::placeholder {
      color: var(--wa-form-control-placeholder-color);
    }
  }

  /* Visually hide the display input when multiple is enabled */
  :host([multiple]) .select:not(.placeholder-visible) .display-input {
    position: absolute;
    z-index: -1;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
  }

  .value-input {
    position: absolute;
    z-index: -1;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    padding: 0;
    margin: 0;
  }

  .tags {
    display: flex;
    flex: 1;
    align-items: center;
    flex-wrap: wrap;
    margin-inline-start: 0.25em;
    gap: 0.25em;

    &::slotted(wa-tag) {
      cursor: pointer !important;
    }

    .disabled &,
    .disabled &::slotted(wa-tag) {
      cursor: not-allowed !important;
    }
  }

  /* Start and End */

  .start,
  .end {
    flex: 0;
    display: inline-flex;
    align-items: center;
    color: var(--wa-color-neutral-on-quiet);
  }

  .end::slotted(*) {
    margin-inline-start: var(--wa-form-control-padding-inline);
  }

  .start::slotted(*) {
    margin-inline-end: var(--wa-form-control-padding-inline);
  }

  :host([multiple]) .start::slotted(*) {
    margin-inline: var(--wa-form-control-padding-inline);
  }

  /* Clear button */
  [part~='clear-button'] {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: inherit;
    color: var(--wa-color-neutral-on-quiet);
    border: none;
    background: none;
    padding: 0;
    transition: color var(--wa-transition-normal);
    cursor: pointer;
    margin-inline-start: var(--wa-form-control-padding-inline);

    &:focus {
      outline: none;
    }

    @media (hover: hover) {
      &:hover {
        color: color-mix(in oklab, currentColor, var(--wa-color-mix-hover));
      }
    }

    &:active {
      color: color-mix(in oklab, currentColor, var(--wa-color-mix-active));
    }
  }

  /* Expand icon */
  .expand-icon {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    color: var(--wa-color-neutral-on-quiet);
    transition: rotate var(--wa-transition-slow) ease;
    rotate: 0deg;
    margin-inline-start: var(--wa-form-control-padding-inline);

    .open & {
      rotate: -180deg;
    }
  }

  /* Listbox */
  .listbox {
    display: block;
    position: relative;
    font: inherit;
    box-shadow: var(--wa-shadow-m);
    background: var(--wa-color-surface-raised);
    border-color: var(--wa-color-surface-border);
    border-radius: var(--wa-border-radius-m);
    border-style: var(--wa-border-style);
    border-width: var(--wa-border-width-s);
    padding-block: 0.5em;
    padding-inline: 0;
    overflow: auto;
    overscroll-behavior: none;

    /* Make sure it adheres to the popup's auto size */
    max-width: var(--auto-size-available-width);
    max-height: var(--auto-size-available-height);

    &::slotted(wa-divider) {
      --spacing: 0.5em;
    }
  }

  slot:not([name])::slotted(small) {
    display: block;
    font-size: var(--wa-font-size-smaller);
    font-weight: var(--wa-font-weight-semibold);
    color: var(--wa-color-text-quiet);
    padding-block: 0.5em;
    padding-inline: 2.25em;
  }

Step Note は、タスクの進捗と記録を一元管理するための Web アプリケーションです。  
タスクをラベルで分類し、各タスクに対してログ（作業記録）とノート（メモ）を蓄積していくことができます。

## 1. アプリの画面構成

Step Note は、画面左から右に向かって以下の5つのパネルで構成されています。

- **メニュー**
  - アプリ全体の操作（表示切替・データのインポート／エクスポート）を行います。
- **ナビゲーション（QUICK ACCESS / LABELS）**
  - 表示するタスクをすばやく絞り込むための条件を選択します。
- **リスト（LIST）**
  - 絞り込み条件に合致するタスクを一覧表示します。
- **タスク（TASK）**
  - 選択したタスクの詳細情報を表示・編集します。
- **ジャーナル（JOURNAL）**
  - 選択したタスクに紐づくログとノートを管理します。

## 2. 基本的な使い方の流れ

1. **LABELS** でラベルを作成し、タスクのカテゴリーを定義します。
2. **LIST** でタスクを追加します。タスクにはラベル・期限日・年度を設定します。
3. **LIST** でタスクをクリックすると、**TASK** と **JOURNAL** にその内容が表示されます。
4. **TASK** でタスク名・期限日・関係者・説明を編集します。
5. **JOURNAL** の Log タブに作業記録を追記します。必要に応じて Note タブにメモを残します。
6. 作業が進んだら **TASK** の **「Mark as」** ボタンからステータスを更新します。

## 3. ショートカットキー一覧

| ショートカット    | 機能名             | 説明                                                            |
| :---------------- | :----------------- | :-------------------------------------------------------------- |
| \`Alt + Shift + E\` | ナビゲーション開閉 | ナビゲーションパネルと LIST パネルの表示／非表示を切り替えます  |
| \`Alt + Shift + T\` | タスク新規追加     | タスク追加ダイアログを開きます                                  |
| \`Alt + Shift + L\` | ログ新規追加       | 選択中のタスクに新しいログを追加します                          |
| \`Alt + Shift + F\` | 全検索モード切替   | 全ての絞り込みを解除し、LIST の検索フィールドにフォーカスします |

## 4. データの管理

Step Note のデータはブラウザのローカルデータベース（IndexedDB）に保存されます。  
データのバックアップや別環境への移行には、メニューのインポート／エクスポート機能を使用してください。

- **エクスポート** — 現在のデータをファイルに書き出します。
- **インポート** — エクスポートしたファイルからデータを復元します。

> **注意:**  
> インポートを実行すると、現在のデータは上書きされます。事前にエクスポートでバックアップを取得することを推奨します。
`,Tg=`# メニュー (MENU) の使い方

メニューは、画面の左端に配置されているアイコン群です。  
アプリ全体の表示切り替えやデータの管理を行うための機能を提供します。

## 1. メニュー項目の説明

上から順に以下のボタンが配置されています。

### 1.1. Explore（表示切り替え）

一番上のファイルアイコンのボタンです。  
クリックすると、画面左側のナビゲーション（QUICK ACCESS / LABELS）とリスト（LIST）の表示／非表示を切り替えることができます。  
タスクの詳細やジャーナルの編集に集中したい場合（Thin Mode）に便利です。

> **ショートカット:** \`Alt + Shift + E\` を押しても同様に表示を切り替えることができます。

### 1.2. Import（データのインポート）

上から2番目のアップロードアイコンのボタンです。  
エクスポートしたバックアップデータ（ファイル）を読み込み、アプリに復元します。  
クリックするとファイル選択ダイアログが開くので、インポートしたいファイルを選択してください。  
処理が完了すると「Complete」ダイアログが表示されます。

> **注意:**  
> インポートを実行すると、現在のデータは上書きされる場合があります。  
> インポートする前に、念のため現在のデータをエクスポートしてバックアップしておくことを推奨します。

### 1.3. Export（データのエクスポート）

上から3番目のダウンロードアイコンのボタンです。  
現在アプリに登録されている全てのデータ（タスク、ログ、ノート、ラベル等）をファイルとして書き出し、ダウンロードします。  
定期的なバックアップや、別の端末へのデータ移行に使用します。

なお、下記の時間帯に自動エクスポートを実行します。  
ブラウザを起動していない場合など想定し、1日に複数回実行します。

| 時間帯 | 説明                                       |
| :----- | :----------------------------------------- |
| 08:30  | 業務開始時点のバックアップです。           |
| 12:00  | 午前中の作業分のバックアップです。         |
| 17:15  | 当日の作業分を含むバックアップです。       |
| 20:00  | 残業した場合を想定してのバックアップです。 |

### 1.4. Help（ヘルプ）

一番下の「？」アイコンのボタンです。  
クリックすると、このヘルプ画面（マニュアル）が表示されます。  
各機能の詳しい使い方やショートカットキーの一覧を確認できます。
`,zg=`# クイックアクセス (QUICK ACCESS) の使い方\r
\r
クイックアクセスは、登録されているタスクやログ及びノートの中から、特定の条件に一致するものをすばやく絞り込んで表示するためのナビゲーションメニューです。\r
\r
## 1. 基本的な操作\r

2. 「QUICK ACCESS」の右側にある矢印アイコン（折りたたみボタン）をクリックすると、メニューの開閉（展開/折りたたみ）を切り替えることができます。\r
3. 表示された各項目の名称をクリックすると、その状態が「選択中」となり、メイン画面のリストがその条件で絞り込まれます。\r

\r
## 2. メニュー項目の一覧と機能\r
\r
クイックアクセスから選択できる絞り込み条件は以下の通りです。  \r
複数の項目を組み合わせた絞り込みが可能な場合があります。\r
\r
### 2.1. マーク・分類\r

- **未分類**\r
  - 特定のラベルが設定されていない、分類待ちのアイテムを表示します。\r
\r
### 2.2. 期限・スケジュール\r
\r

  - 設定された期限が迫っているアイテムを表示します。\r

\r

\r

  - すでに対応が完了した（ステータスが「完了」の）アイテムを表示します。\r
- **対応中**\r
  - 現在作業を進めている（ステータスが「対応中」の）アイテムを表示します。\r
- **開始待ち**\r
  - まだ作業に取り掛かっていない（ステータスが「開始待ち」の）アイテムを表示します。\r
`,Ig=`# ラベル (LABELS) の使い方

LABELS は、タスクをカテゴリーごとに分類・整理するためのナビゲーションセクションです。  
ラベルを選択すると、そのラベルが設定されているアイテムのみがメイン画面に表示されます。

## 1. 基本的な操作

1. 画面のサイドバー（ナビゲーション領域）にある **「LABELS」** というセクションに移動します。
2. 表示されたラベル名をクリックすると、その状態が「選択中」となり、メイン画面のリストがそのラベルで絞り込まれます。
3. もう一度クリックすると「選択解除」となり、絞り込みが解除されます。

## 2. ラベルのフィルタリング

ラベルが多い場合は、セクション上部の検索フィールドにキーワードを入力することで、ラベル一覧をリアルタイムに絞り込むことができます。  
入力欄右端の「×」ボタンをクリックすると、フィルタをクリアして全件表示に戻ります。

## 3. ラベルの追加

1. LABELS セクションのヘッダー右側にある **「＋」ボタン** をクリックします。
2. 「Label Editor」ダイアログが開きます。
3. ラベル名を入力します。
4. **「保存」** ボタンをクリックすると、ラベルが登録されます。
   - 保存後、そのラベルは自動的に選択中の状態になります。

## 4. ラベルの編集

1. 編集したいラベルにカーソルを合わせ、右端に表示される **メニューアイコン（三本線）** をクリックします。
2. ドロップダウンメニューから **「プロパティ」** を選択します。
3. 「Label Editor」ダイアログが開き、現在のラベル名が入力済みの状態で表示されます。
4. ラベル名を編集し、**「保存」** ボタンをクリックすると変更が反映されます。

## 5. ラベルの削除

1. 削除したいラベルにカーソルを合わせ、右端に表示される **メニューアイコン（三本線）** をクリックします。
2. ドロップダウンメニューから **「削除」** を選択します。
3. 「Confirm Delete」ダイアログが開きます。
4. **「削除」** ボタンをクリックすると、ラベルが完全に削除されます。操作を取り消す場合は **「キャンセル」** をクリックします。

> **注意:**
> ラベルの削除は取り消せません。
> また、そのラベルが設定されていたアイテムは「未分類」として扱われるようになります。
`,Pg=`# リスト (LIST) の使い方

LIST は、登録されているタスクを一覧表示するメインセクションです。  
サイドバーで選択したラベルやクイックアクセスの条件に基づいて、表示内容が絞り込まれます。

## 1. 基本的な操作

1. 画面中央にある **「LIST」** セクションにタスクの一覧が表示されます。
2. タスクをクリックすると、そのタスクが「選択中」の状態になり、右側の詳細パネルにタスクの内容が表示されます。
3. 選択中のタスクには **「>」** のアイコンが表示されます。

## 2. タスクのフィルタリング

タスクが多い場合は、セクション上部の検索フィールドにキーワードを入力することで、タスク一覧をリアルタイムに絞り込むことができます。  
入力欄右端の「×」ボタンをクリックすると、フィルタをクリアして全件表示に戻ります。

> **ショートカット:** \`Alt + Shift + F\` を押すと、ラベルとクイックアクセスの選択をすべて解除し、検索フィールドにフォーカスを当てることができます。

## 3. タスクの並び順と年度グループ

タスクは **年度ごとにグループ化** されて表示されます。  
各年度グループには、そのグループに属するタスクの件数が表示されます。

## 4. タスクアイテムの見方

各タスクアイテムには以下の情報が表示されます。

- **ステータスアイコン**
  - タスクの進行状態を示します。
  - 開始待ち / 対応中 / 完了 の3種類があります。
- **タスク名**
  - タスクの名称です。
- **お気に入りアイコン**
  - クリックするとお気に入り（ブックマーク）の登録・解除を切り替えることができます。
- **期限日**
  - タスクに設定された期限日が表示されます。
  - 期限を過ぎたタスクは赤色でハイライトされます。
  - 期限が3日以内に迫っているタスクは黄色でハイライトされます。
- **ラベル名**
  - タスクが属するラベルの名前が表示されます。
  - ラベル未設定の場合は「未分類」と表示されます。

## 5. タスクの追加

タスクの追加は、LABELS セクションにラベルが1件以上登録されている場合にのみ行えます。

1. LIST セクションのヘッダー右側にある **「＋」ボタン** をクリックします。
   - **ショートカット:** \`Alt + Shift + T\` を押しても同様にダイアログを開くことができます。
2. 「Add Task」ダイアログが開きます。
3. 以下の項目を入力します。
   - **タスク名** — タスクの名称を入力します。
   - **期限日** — タスクの期限日を選択します。初期値は当日の日付です。
   - **年度** — タスクを分類する年度を選択します。初期値は現在の年度です。
   - **ラベル** — タスクを分類するラベルを選択します。初期値は現在選択中のラベルです。
4. **「追加」** ボタンをクリックすると、タスクが登録されます。
   - 登録後、そのタスクは自動的に選択中の状態になります。
`,Dg=`# タスク (TASK) の使い方

TASK は、LIST で選択したタスクの詳細を表示・編集するセクションです。  
**Summary** と **Property** の2つのタブで構成されています。

## 1. 基本的な操作

1. LIST でタスクをクリックして選択すると、TASK セクションに選択したタスクの内容が表示されます。
2. 各入力欄を編集すると、内容は自動的に保存されます。
3. ヘッダー右側の **「Mark as」ボタン** をクリックすると、タスクのステータスを変更できます。

## 2. ステータスの変更

**「Mark as」** ドロップダウンから変更先のステータスを選択します。  
選択できるステータスは以下の3種類です。

- **開始待ち**
  - まだ作業を開始していない状態です。
- **対応中**
  - 現在作業を進めている状態です。
- **完了**
  - 作業が完了した状態です。

> ステータスを変更すると、変更内容がログに自動記録されます。

## 3. Summary タブ

Summary タブでは、タスクの主要な情報を編集します。

- **タスク名**
  - タスクの名称を入力します。
  - タスク名の左側にはステータスアイコンが表示されます。
  - **「Copy ID」ボタン** をクリックすると、Markdown リンク形式のタスク ID とタスク名をクリップボードにコピーできます。
- **期限日**
  - タスクの期限日を日付ピッカーで設定します。
- **関係者**
  - タスクに関連する担当者の情報を入力します。
  - **所属** — 担当者の組織名・部署名を入力します。
  - **氏名** — 担当者の氏名を入力します。
  - **電話番号** — 担当者の電話番号を入力します。
- **タスク説明**
  - タスクの詳細説明を Markdown 形式で記述できます。

## 4. Property タブ

Property タブでは、タスクの分類情報や管理用メタデータを編集します。

- **ID**
  - タスクに自動付与された一意の識別番号です。変更はできません。
- **作成日**
  - タスクが作成された日時です。変更はできません。
- **更新日**
  - タスクが最後に更新された日時です。変更はできません。
- **年度**
  - タスクが属する年度を選択します。変更するとリスト上の年度グループも更新されます。
- **ラベル**
  - タスクが属するラベルを選択します。「未分類」を選択するとラベルなしの状態になります。

## 5. タスクの削除

タスクの削除は Property タブから行います。誤操作防止のため、2段階の操作が必要です。

1. Property タブを開きます。
2. **「このタスクを削除可能とする」** スイッチをオンにします。
3. **「Delete」** ボタンが有効になるのでクリックします。
4. 「Confirm Delete」ダイアログが開きます。
5. **「削除」** ボタンをクリックすると、タスクが完全に削除されます。操作を取り消す場合は **「キャンセル」** をクリックします。

> **注意:**  
> タスクの削除は取り消せません。  
> タスクに紐づくログやノートもあわせて削除されます。
`,Mg=`# ジャーナル (JOURNAL) の使い方

JOURNAL は、LIST で選択したタスクに紐づく記録を管理するセクションです。  
**Log** と **Note** の2つのタブで構成されています。

## 1. 基本的な操作

1. LIST でタスクをクリックして選択すると、JOURNAL セクションに選択したタスクのログとノートが表示されます。
2. タスクを切り替えると、表示内容は自動的に新しいタスクのものに更新されます。
3. Note タブに内容が入力されている場合、タブ名にマーク（インジケーター）が表示されます。

## 2. Log タブ

Log タブでは、タスクに関する時系列の作業記録（ログ）を管理します。  
各ログは Markdown 形式で記述できます。

### 2.1. ログの追加

1. Log タブ下部にある **「＋（Add）」ボタン** をクリックします。
   - **ショートカット:** \`Alt + Shift + L\` を押しても新規ログを追加できます。
2. ログ一覧の末尾に新しいログエントリが追加され、自動的に最下部にスクロールします。
3. 追加されたエディタに内容を入力します。入力内容は自動的に保存されます。

### 2.2. ログの見方

各ログアイテムには以下の情報が表示されます。

- **作成日時**
  - ログが作成された日時（\`yyyy-MM-dd HH:mm\` 形式）が表示されます。
- **相対時刻**
  - 作成日時から現在までの経過時間が表示されます（例：「3時間前」）。
- **Markdown エディタ**
  - ログの内容を Markdown 形式で編集できます。入力内容は自動的に保存されます。

### 2.3. ログのフィルタリング

ログが多い場合は、Log タブ上部の検索フィールドにキーワードを入力することで、一覧をリアルタイムに絞り込むことができます。  
入力欄右端の「×」ボタンをクリックすると、フィルタをクリアして全件表示に戻ります。

### 2.4. ログのスクロール

Log タブ下部のボタンでログ一覧をスクロールできます。

- **「↑（Scroll Up）」ボタン** — 一覧の先頭（最古のログ）までスクロールします。
- **「↓（Scroll Down）」ボタン** — 一覧の末尾（最新のログ）までスクロールします。

### 2.5. ログの削除

1. 削除したいログの右上にある **メニューアイコン（三本線）** をクリックします。
2. ドロップダウンメニューから **「削除」** を選択します。
3. 「Confirm Delete」ダイアログが開きます。
4. **「削除」** ボタンをクリックすると、ログが完全に削除されます。操作を取り消す場合は **「キャンセル」** をクリックします。

> **注意:**  
> ログの削除は取り消せません。

## 3. Note タブ

Note タブでは、タスクに関する自由なメモ（ノート）を1件管理します。  
ログと異なり、追加・削除はなく、常に1つのエディタが表示されます。

1. Note タブをクリックして切り替えます。
2. エディタに内容を Markdown 形式で自由に入力します。
3. 入力内容は自動的に保存されます。
4. ノートに内容が入力されている場合、Log タブから見てもタブ名にマークが表示されます。

Hub Address は、職員情報および組織情報をすばやく検索・参照するための Web アプリケーションです。  
CSVファイルからデータを取り込み、必要な情報を即座に見つけ出すことができます。

## 1. アプリの画面構成

Hub Address は、画面左から右に向かって以下の3つのパネルで構成されています。

- **メニュー**
  - アプリ全体の操作（検索キーワードのクリア・データの全件削除・ヘルプ）を行います。
- **職員情報 (Staff)**
  - 職員の氏名、所属、役職、メールアドレスなどの情報を検索・表示します。
- **組織情報 (Division)**
  - 組織の場所、部局・課・係、内線・外線・FAX番号などを検索・表示します。

## 2. 基本的な使い方の流れ

1. 初期状態ではデータが登録されていないため、**職員情報**および**組織情報**の各パネルからCSVファイルをアップロードします。
2. データが取り込まれると、一覧が表示されます。
3. パネル上部の検索フィールドにキーワードを入力して、目的の情報を絞り込みます。
4. 一覧から該当する項目をクリックすると、情報がクリップボードにコピーされ、他方のパネルの検索フィールドに自動的に連携されます（クロス検索）。

## 3. データの管理

Hub Address のデータはブラウザのローカルデータベース（IndexedDB）に保存されます。  
CSVデータを取り込むことで、オフライン環境でも高速に検索を行うことが可能です。  
不要になったデータは、メニューの削除機能から一括で消去できます。
`,s0=`# メニュー (MENU) の使い方

メニューは、画面の左端に配置されているアイコン群です。  
検索状態の初期化や、登録されているデータの管理を行うための機能を提供します。

## 1. メニュー項目の説明

上から順に以下のボタンが配置されています。

### 1.1. Clear（クリア）

一番上の消しゴムアイコンのボタンです。  
クリックすると、職員情報および組織情報に入力されている検索キーワードをすべてクリア（初期化）します。  
素早く全体表示に戻したい場合に便利です。

### 1.2. Delete All（データ削除）

中央の四角形に斜線が入ったアイコンのボタンです。  
アプリに登録されているすべての職員情報と組織情報を一括で削除します。  
データの更新が必要な場合や、不要になったデータを整理する場合に使用します。

クリックすると確認のダイアログ（登録データ削除）が表示されます。  
「削除」ボタンをクリックすると、データは完全に消去され、元に戻すことはできません。

### 1.3. Help（ヘルプ）

一番下の「？」アイコンのボタンです。  
クリックすると、このヘルプ画面（マニュアル）が表示されます。  
各機能の使い方を確認できます。
`,a0=`# 検索機能 (SEARCH) の使い方

各情報パネルの上部には、データを絞り込むための検索フィールドが用意されています。

## 1. 基本的な検索

検索フィールドにキーワードを入力すると、リアルタイムでリストが絞り込まれます。

- **職員情報の検索**
  - 氏名、カナ氏名、所属、役職など、入力されたキーワードに合致する項目が絞り込まれます。
- **組織情報の検索**
  - 場所、部局名、課名、役職、内線番号など、入力されたキーワードに合致する項目が絞り込まれます。

## 2. 検索キーワードのクリア

検索フィールドのキーワードを削除するには、以下の方法があります。

1. **手動で削除:** キーボード操作で直接入力内容を消去します。
2. **メニューの Clear ボタン:** 画面左端のメニューから Clear（消しゴムアイコン）をクリックすると、職員情報と組織情報の両方の検索キーワードが同時にクリアされます。

## 3. クロス検索

一方のリスト内のアイテムをクリックすると、自動的にそのアイテムのテキストが他方の検索フィールドに入力され、関連情報が絞り込まれる機能があります。  
詳しくは「ビューアー (VIEWER) の使い方」を参照してください。
`,l0=`# データアップロード (UPLOADER) の使い方

Hub Address を初めて利用する際や、データを全件削除した後は、CSVファイルをアップロードしてデータを登録する必要があります。

## 1. アップロードの手順

1. データが未登録の場合、各パネルの中央に点線で囲まれたアップロードエリアが表示されます。
   - 職員情報パネルには「職員情報」のアップロードエリアが表示されます。
   - 組織情報パネルには「組織情報」のアップロードエリアが表示されます。
2. アップロードエリアをクリックして、用意したCSVファイルを選択します。（または、CSVファイルをエリア内に直接ドラッグ＆ドロップします。）
3. ファイルが読み込まれると、自動的にデータが取り込まれ、一覧画面が表示されるようになります。

## 2. CSVファイルのフォーマット

アップロードするCSVファイルは、1行目がヘッダー（キー）として扱われます。

- **職員情報用 CSV** の例
  - \`staffId,nameKj,nameKn,div,post,mail1,mail2\`
  - 職員番号、漢字氏名、カナ氏名、所属、役職、内部メールアドレス、外部メールアドレス
- **組織情報用 CSV** の例
  - \`place,div1,div2,div3,post,other,tel1,tel2,fax,remark\`
  - 場所、部局、課、係、役職、その他、内線、外線、FAX、備考

### 2.1 アップロード時の注意点

データを取り込む際、空行は自動的に除外されます。  
アップロードが完了すると、ブラウザのローカルデータベースにデータが保存されるため、次回以降のアクセス時には再アップロードの必要はありません。
`,c0=`# ビューアー (VIEWER) の使い方

ビューアーは、アップロードされた職員情報および組織情報を一覧表示する領域です。

## 1. 一覧の見方

リストにはテーブル形式でデータが並んでおり、各列には対応する情報が表示されます。  
データ量が多い場合でもスムーズにスクロールできるよう最適化されています。

- **職員情報リスト**
  - 職員番号、氏名、所属、役職、メールアドレスなどが表示されます。
- **組織情報リスト**
  - 場所、所属（部局/課/係）、内線・外線番号、FAX、備考などが表示されます。

## 2. アイテムのクリックアクション

リスト内に表示されている各項目（セル）をクリックすると、以下の2つのアクションが同時に実行されます。

### 2.1. クリップボードへのコピー

クリックした項目のテキスト内容が自動的にクリップボードにコピーされます。  
メールアドレスや内線番号、氏名などを他のアプリケーション（メールやチャットツールなど）に貼り付ける際に便利です。

### 2.2. クロス検索の実行

- **例:** 職員情報のリストから特定の「所属名」をクリックすると、そのテキストが組織情報の検索フィールドに設定され、該当する組織の情報が瞬時に絞り込まれます。
- **例:** 組織情報のリストから「役職名」をクリックすると、そのテキストが職員情報の検索フィールドに設定され、該当する職員の一覧が表示されます。
